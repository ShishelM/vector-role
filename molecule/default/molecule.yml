---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: ubuntu-latest
    image: docker.io/geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns: host

  - name: oraclelinux-8
    image: docker.io/geerlingguy/docker-oraclelinux8-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns: host
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../..
verifier:
  name: ansible
