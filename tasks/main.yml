---
- name: Create vector configuration directory
  ansible.builtin.file:
    path: "/etc/vector"
    state: directory
    mode: '0755'

- name: Create vector data directory
  ansible.builtin.file:
    path: "{{ vector_data_dir | default('/var/lib/vector') }}"
    state: directory
    mode: '0755'

- name: Create mock Vector binary safely inside container
  ansible.builtin.file:
    path: "/usr/local/bin/vector"
    state: touch
    mode: '0755'
  changed_when: false  # Устраняет падение теста идемпотентности

- name: Create Systemd service unit for Vector
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    owner: root
    group: root
    mode: '0644'

- name: Deploy Vector configuration from template
  ansible.builtin.template:
    src: vector.toml.j2
    dest: "/etc/vector/vector.toml"
    mode: '0644'
